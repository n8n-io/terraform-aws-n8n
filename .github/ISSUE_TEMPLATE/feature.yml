name: Feature request
description: Propose a new input, output, resource, or behavior.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the proposal. Before submitting, please:

        - Check existing issues to see if this has already been requested.
        - Check [`ROADMAP.md`](../../ROADMAP.md) — your idea may already be
          on the candidate list.
        - Skim [`README.md → Out of scope`](../../README.md#out-of-scope)
          — some categories are intentionally not in scope at this stage.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the use case from your perspective. What are you trying
        to do that the module doesn't support today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How could the module solve this? A new input? A new resource? A
        change to an existing default? Be specific about the user-facing
        surface (variable names, types, defaults).
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other ways to solve the same problem. If you've ruled them out,
        why?
    validations:
      required: false

  - type: dropdown
    id: backwards_compatible
    attributes:
      label: Would this be a backwards-compatible change?
      description: |
        See [`README.md → Stability & versioning`](../../README.md#stability--versioning).
        Additive changes (new optional input, new output, new resource
        that doesn't disturb existing state) can ship in a patch. Anything
        that changes a default that moves infra, renames an input, or
        shifts resource addresses needs a minor release.
      options:
        - "Yes — additive only (could ship as a patch)"
        - "No — changes existing defaults or renames inputs (would need a minor release)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: anything_else
    attributes:
      label: Anything else?
      description: Links, prior art in other modules, related issues, etc.
    validations:
      required: false
